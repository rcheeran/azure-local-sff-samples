# --------------------------------------------------------------------------- #
# TLS certificate for the Whisper Ingress.                                    #
#                                                                              #
# Same shape as model_qwen2.5_cpu_cert.yaml: a 90-day Certificate signed by   #
# the existing `foundry-local-operator-ca-issuer` ClusterIssuer. Cert-manager #
# writes the resulting key+cert into the secret `whisper-gpu-local-tls`,      #
# which is what the Ingress in whisper_base_gpu.yaml references.              #
#                                                                              #
# DNS SANs include both the public ingress hostname AND the in-cluster        #
# Service DNS names, so the certificate also works if you skip the Ingress    #
# and call the Service directly (e.g., from another pod via                   #
# https://whisper-gpu.whisper.svc.cluster.local).                             #
#                                                                              #
# Apply:                                                                       #
#   kubectl apply -f whisper_base_gpu_cert.yaml                                #
#                                                                              #
# Verify:                                                                      #
#   kubectl -n whisper get certificate whisper-gpu-local-cert                  #
#   # READY=True within ~10s once the ClusterIssuer is healthy.                #
# --------------------------------------------------------------------------- #
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: whisper-gpu-local-cert
  namespace: whisper
  labels:
    app.kubernetes.io/name: whisper-gpu
    app.kubernetes.io/component: tls
spec:
  secretName: whisper-gpu-local-tls
  duration: 2160h     # 90 days
  renewBefore: 360h   # 15 days
  commonName: whisper-gpu.local
  dnsNames:
    - whisper-gpu.local
    - whisper-gpu
    - whisper-gpu.whisper
    - whisper-gpu.whisper.svc
    - whisper-gpu.whisper.svc.cluster.local
  issuerRef:
    name: foundry-local-operator-ca-issuer
    kind: ClusterIssuer
    group: cert-manager.io
