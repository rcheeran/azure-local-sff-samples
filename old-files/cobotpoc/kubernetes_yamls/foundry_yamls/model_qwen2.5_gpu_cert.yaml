apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: qwen2-5-1-5b-gpu-local-cert
  namespace: foundry-local-operator
spec:
  secretName: qwen2-5-1-5b-gpu-local-tls
  duration: 2160h # 90 days
  renewBefore: 360h # 15 days
  commonName: qwen-gpu.local
  dnsNames:
    - qwen-gpu.local
    - qwen-gpu
    - qwen-gpu.foundry-local-operator
