apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: qwen2-5-0-5b-local-cert
  namespace: foundry-local-operator
spec:
  secretName: qwen2-5-0-5b-local-tls
  duration: 2160h # 90 days
  renewBefore: 360h # 15 days
  commonName: qwen-cpu.local
  dnsNames:
    - qwen-cpu.local
    - qwen-cpu
    - qwen-cpu.foundry-local-operator
    - qwen-cpu.foundry-local-operator.svc
    - qwen-cpu.foundry-local-operator.svc.cluster.local
  issuerRef:
    name: foundry-local-operator-ca-issuer
    kind: ClusterIssuer
