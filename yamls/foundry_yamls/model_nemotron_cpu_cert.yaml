apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: nemotron-cpu-local-cert
  namespace: foundry-local-operator
spec:
  secretName: nemotron-cpu-local-tls
  duration: 2160h # 90 days
  renewBefore: 360h # 15 days
  commonName: nemotron-cpu.local
  dnsNames:
    - nemotron-cpu.local
    - nemotron-cpu
    - nemotron-cpu.foundry-local-operator
    - nemotron-cpu.foundry-local-operator.svc
    - nemotron-cpu.foundry-local-operator.svc.cluster.local
  issuerRef:
    name: foundry-local-operator-ca-issuer
    kind: ClusterIssuer
